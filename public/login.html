<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Talk — Sign In</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--background);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            z-index: 1;
        }

        .login-card {
            background: var(--surface-primary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 8px 30px var(--shadow-color);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .login-header .logo {
            margin-bottom: 1.5rem;
            text-decoration: none;
        }

        .login-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            color: var(--text-color);
        }

        .login-header p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin: 0;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-color);
            margin-bottom: 0.4rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: var(--surface-secondary);
            color: var(--text-color);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
            font-family: var(--font-family);
        }

        .form-group input:hover,
        .form-group input:focus {
            background: var(--surface-primary);
            border-color: var(--primary-color);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(66, 133, 244, 0.12);
        }

        .btn-full {
            width: 100%;
            margin-top: 0.5rem;
        }

        .toggle-mode {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .toggle-mode a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .toggle-mode a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: rgba(234, 67, 53, 0.1);
            border: 1px solid rgba(234, 67, 53, 0.3);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--accent-color);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .success-message {
            background: rgba(52, 168, 83, 0.1);
            border: 1px solid rgba(52, 168, 83, 0.3);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: #137333;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }

        .success-message.visible {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .signup-extra {
            display: none;
        }

        .signup-extra.visible {
            display: block;
        }
    </style>
</head>

<body>
    <canvas id="particle-canvas"></canvas>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <a href="index.html" class="logo">
                    <div class="logo-icon">
                        <div class="pie-slice"></div>
                    </div>
                    DATA TALK
                </a>
                <h1 id="form-title">Sign In</h1>
                <p id="form-subtitle">Access your data analysis workspace</p>
            </div>

            <div id="error-msg" class="error-message"></div>
            <div id="success-msg" class="success-message"></div>

            <form id="auth-form" onsubmit="handleSubmit(event)">
                <div class="form-group signup-extra" id="name-group">
                    <label for="display-name">Display Name</label>
                    <input type="text" id="display-name" placeholder="Your name" maxlength="50" autocomplete="name">
                </div>
                <div class="form-group" id="email-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group" id="password-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem;">
                        <label for="password" style="margin-bottom: 0;">Password</label>
                        <a onclick="setMode('forgot')" id="forgot-link" style="font-size: 0.8rem; color: var(--primary-color); cursor: pointer; text-decoration: none;">Forgot password?</a>
                    </div>
                    <input type="password" id="password" placeholder="••••••••" required minlength="8"
                        autocomplete="current-password">
                </div>
                <div class="form-group signup-extra" id="confirm-password-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="submit-btn">
                    Sign In
                </button>
            </form>

            <div class="toggle-mode" id="toggle-section">
                Don't have an account? <a onclick="setMode('signup')">Sign Up</a>
            </div>
            <div class="toggle-mode" id="back-login-section" style="display: none; margin-top: 1rem;">
                <a onclick="setMode('login')" style="color: var(--text-light);">← Back to Sign In</a>
            </div>
        </div>
    </div>

    <script src="js/auth-client.js"></script>
    <script>
        const API_BASE = window.location.origin;
        let currentMode = 'login'; // login, signup, forgot, update
        let recoveryToken = '';

        // Check if already logged in or if recovery URL
        (async function checkExistingSession() {
            // Check for Recovery Token in URL Hash
            const hash = window.location.hash.substring(1);
            if (hash.includes('type=recovery') && hash.includes('access_token=')) {
                const params = new URLSearchParams(hash);
                recoveryToken = params.get('access_token');
                setMode('update');
                return;
            }

            if (!window.AuthClient || typeof window.AuthClient.getSession !== 'function') return;
            const user = await window.AuthClient.getSession();
            if (user) {
                window.location.href = 'dashboard.html';
            }
        })();

        function setMode(mode) {
            currentMode = mode;
            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');
            const btn = document.getElementById('submit-btn');
            const toggle = document.getElementById('toggle-section');
            const backLogin = document.getElementById('back-login-section');
            const nameGroup = document.getElementById('name-group');
            const emailGroup = document.getElementById('email-group');
            const pwGroup = document.getElementById('password-group');
            const confirmPwGroup = document.getElementById('confirm-password-group');
            const confirmPwInput = document.getElementById('confirm-password');
            const forgotLink = document.getElementById('forgot-link');
            const emailInput = document.getElementById('email');
            const pwInput = document.getElementById('password');

            hideMessages();

            // Reset visibilities
            nameGroup.classList.remove('visible');
            confirmPwGroup.classList.remove('visible');
            emailGroup.style.display = 'block';
            pwGroup.style.display = 'block';
            forgotLink.style.display = 'none';
            backLogin.style.display = 'none';
            toggle.style.display = 'none';
            
            emailInput.required = true;
            pwInput.required = true;
            confirmPwInput.required = false;
            btn.disabled = false;

            switch(mode) {
                case 'signup':
                    title.textContent = 'Create Account';
                    subtitle.textContent = 'Start analysing your data today';
                    btn.textContent = 'Create Account';
                    toggle.innerHTML = 'Already have an account? <a onclick="setMode(\'login\')">Sign In</a>';
                    toggle.style.display = 'block';
                    nameGroup.classList.add('visible');
                    confirmPwGroup.classList.add('visible');
                    confirmPwInput.required = true;
                    pwInput.setAttribute('autocomplete', 'new-password');
                    break;
                case 'login':
                    title.textContent = 'Sign In';
                    subtitle.textContent = 'Access your data analysis workspace';
                    btn.textContent = 'Sign In';
                    toggle.innerHTML = 'Don\'t have an account? <a onclick="setMode(\'signup\')">Sign Up</a>';
                    toggle.style.display = 'block';
                    forgotLink.style.display = 'block';
                    pwInput.setAttribute('autocomplete', 'current-password');
                    break;
                case 'forgot':
                    title.textContent = 'Reset Password';
                    subtitle.textContent = 'Enter your email to receive a reset link';
                    btn.textContent = 'Send Reset Link';
                    pwGroup.style.display = 'none';
                    pwInput.required = false;
                    backLogin.style.display = 'block';
                    break;
                case 'update':
                    title.textContent = 'Update Password';
                    subtitle.textContent = 'Enter your new password below';
                    btn.textContent = 'Update Password';
                    emailGroup.style.display = 'none';
                    emailInput.required = false;
                    backLogin.style.display = 'block';
                    pwInput.setAttribute('autocomplete', 'new-password');
                    confirmPwGroup.classList.add('visible');
                    confirmPwInput.required = true;
                    break;
            }
        }

        // Exists for backwards compatibility with the HTML onclick previously used
        function toggleMode() {
            setMode(currentMode === 'login' ? 'signup' : 'login');
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.add('visible');
            document.getElementById('success-msg').classList.remove('visible');
        }

        function showSuccess(msg) {
            const el = document.getElementById('success-msg');
            el.textContent = msg;
            el.classList.add('visible');
            document.getElementById('error-msg').classList.remove('visible');
        }

        function hideMessages() {
            document.getElementById('error-msg').classList.remove('visible');
            document.getElementById('success-msg').classList.remove('visible');
        }

        function getBtnText(working) {
            if (working) return '<span class="spinner"></span>Processing...';
            switch(currentMode) {
                case 'signup': return 'Create Account';
                case 'login': return 'Sign In';
                case 'forgot': return 'Send Reset Link';
                case 'update': return 'Update Password';
            }
        }

        async function handleSubmit(event) {
            event.preventDefault();
            hideMessages();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const btn = document.getElementById('submit-btn');

            if (currentMode !== 'update' && !email) {
                showError('Please enter your email.');
                return;
            }

            if (currentMode === 'signup' || currentMode === 'update') {
                if (password !== confirmPassword) {
                    showError('Passwords do not match.');
                    return;
                }
            }

            if (currentMode !== 'forgot') {
                if (!password || password.length < 8) {
                    showError('Password must be at least 8 characters.');
                    return;
                }
                if (!/[a-zA-Z]/.test(password)) {
                    showError('Password must contain at least one letter (a-z, A-Z).');
                    return;
                }
                if (!/[!@#$%^&*(),.?":{}|<>]/.test(password)) {
                    showError('Password must contain at least one special character (e.g., @, #, $, %).');
                    return;
                }
            }

            btn.disabled = true;
            btn.innerHTML = getBtnText(true);

            try {
                let endpoint, body;
                if (currentMode === 'signup') {
                    endpoint = '/api/auth/signup';
                    body = { email, password, display_name: document.getElementById('display-name').value.trim() || email.split('@')[0] };
                } else if (currentMode === 'login') {
                    endpoint = '/api/auth/login';
                    body = { email, password };
                } else if (currentMode === 'forgot') {
                    endpoint = '/api/auth/reset-password';
                    body = { email };
                } else if (currentMode === 'update') {
                    endpoint = '/api/auth/update-password';
                    body = { access_token: recoveryToken, password };
                }

                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();

                if (!res.ok || data.error) {
                    const errorMsg = typeof data.error === 'string' ? data.error : (data.text || data.message || 'Action failed. Please try again.');
                    showError(errorMsg);
                    btn.disabled = false;
                    btn.innerHTML = getBtnText(false);
                    return;
                }

                if (currentMode === 'forgot') {
                    showSuccess('If an account exists with this email, a reset link has been sent. Check your inbox.');
                    btn.disabled = false;
                    btn.innerHTML = getBtnText(false);
                } else if (currentMode === 'update') {
                    showSuccess('Password updated successfully! Redirecting to login...');
                    window.location.hash = '';
                    setTimeout(() => setMode('login'), 2000);
                } else if (data.success && !data.email_confirmation_required) {
                    if (window.AuthClient && typeof window.AuthClient.setCachedUser === 'function') {
                        window.AuthClient.setCachedUser(data.user || null);
                    }
                    showSuccess(currentMode === 'signup' ? 'Account created! Redirecting...' : 'Success! Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                } else if (currentMode === 'signup' && data.email_confirmation_required) {
                    showSuccess('Account created! Please check your email to verify your account, then sign in.');
                    btn.disabled = false;
                    btn.innerHTML = getBtnText(false);
                    setTimeout(() => setMode('login'), 2000);
                }
            } catch (err) {
                showError('Network error. Please check your connection and try again.');
                btn.disabled = false;
                btn.innerHTML = getBtnText(false);
            }
        }
    </script>
    <script src="js/core.js"></script>
</body>

</html>
