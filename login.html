<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Talk — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--background);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            z-index: 1;
        }

        .login-card {
            background: var(--surface-primary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 8px 30px var(--shadow-color);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .login-header .logo {
            margin-bottom: 1.5rem;
            text-decoration: none;
        }

        .login-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            color: var(--text-color);
        }

        .login-header p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin: 0;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-color);
            margin-bottom: 0.4rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: var(--surface-secondary);
            color: var(--text-color);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
            font-family: var(--font-family);
        }

        .form-group input:hover,
        .form-group input:focus {
            background: var(--surface-primary);
            border-color: var(--primary-color);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(66, 133, 244, 0.12);
        }

        .btn-full {
            width: 100%;
            margin-top: 0.5rem;
        }

        .toggle-mode {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .toggle-mode a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .toggle-mode a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: rgba(234, 67, 53, 0.1);
            border: 1px solid rgba(234, 67, 53, 0.3);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--accent-color);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .success-message {
            background: rgba(52, 168, 83, 0.1);
            border: 1px solid rgba(52, 168, 83, 0.3);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: #137333;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
        
        [data-theme="dark"] .success-message {
            color: #81c995;
        }

        .success-message.visible {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .signup-extra {
            display: none;
        }

        .signup-extra.visible {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <a href="index.html" class="logo">
                    <div class="logo-icon">
                        <div class="pie-slice"></div>
                    </div>
                    DATA TALK
                </a>
                <h1 id="form-title">Sign In</h1>
                <p id="form-subtitle">Access your data analysis workspace</p>
            </div>

            <div id="error-msg" class="error-message"></div>
            <div id="success-msg" class="success-message"></div>

            <form id="auth-form" onsubmit="handleSubmit(event)">
                <div class="form-group signup-extra" id="name-group">
                    <label for="display-name">Display Name</label>
                    <input type="text" id="display-name" placeholder="Your name" autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="submit-btn">
                    Sign In
                </button>
            </form>

            <div class="toggle-mode" id="toggle-section">
                Don't have an account? <a onclick="toggleMode()">Sign Up</a>
            </div>
        </div>
    </div>

    <script>
        // Check for saved theme preference, otherwise use system preference
        const savedTheme = localStorage.getItem('dt_theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        const API_BASE = window.location.origin;
        let isSignUp = false;

        // Check if already logged in
        (async function checkExistingSession() {
            const token = localStorage.getItem('dt_access_token');
            if (!token) return;
            try {
                const res = await fetch(`${API_BASE}/api/auth/session`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    window.location.href = 'dashboard.html';
                } else {
                    localStorage.removeItem('dt_access_token');
                    localStorage.removeItem('dt_refresh_token');
                    localStorage.removeItem('dt_user');
                }
            } catch {
                // Network error — stay on login page
            }
        })();

        function toggleMode() {
            isSignUp = !isSignUp;
            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');
            const btn = document.getElementById('submit-btn');
            const toggle = document.getElementById('toggle-section');
            const nameGroup = document.getElementById('name-group');

            hideMessages();

            if (isSignUp) {
                title.textContent = 'Create Account';
                subtitle.textContent = 'Start analyzing your data today';
                btn.textContent = 'Create Account';
                toggle.innerHTML = 'Already have an account? <a onclick="toggleMode()">Sign In</a>';
                nameGroup.classList.add('visible');
                document.getElementById('password').setAttribute('autocomplete', 'new-password');
            } else {
                title.textContent = 'Sign In';
                subtitle.textContent = 'Access your data analysis workspace';
                btn.textContent = 'Sign In';
                toggle.innerHTML = 'Don\'t have an account? <a onclick="toggleMode()">Sign Up</a>';
                nameGroup.classList.remove('visible');
                document.getElementById('password').setAttribute('autocomplete', 'current-password');
            }
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.add('visible');
            document.getElementById('success-msg').classList.remove('visible');
        }

        function showSuccess(msg) {
            const el = document.getElementById('success-msg');
            el.textContent = msg;
            el.classList.add('visible');
            document.getElementById('error-msg').classList.remove('visible');
        }

        function hideMessages() {
            document.getElementById('error-msg').classList.remove('visible');
            document.getElementById('success-msg').classList.remove('visible');
        }

        async function handleSubmit(event) {
            event.preventDefault();
            hideMessages();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submit-btn');

            if (!email || !password) {
                showError('Please enter your email and password.');
                return;
            }
            if (password.length < 6) {
                showError('Password must be at least 6 characters.');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>' + (isSignUp ? 'Creating...' : 'Signing in...');

            try {
                const endpoint = isSignUp ? '/api/auth/signup' : '/api/auth/login';
                const body = { email, password };

                if (isSignUp) {
                    body.display_name = document.getElementById('display-name').value.trim() || email.split('@')[0];
                }

                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();

                if (!res.ok || data.error) {
                    showError(data.error || 'Authentication failed. Please try again.');
                    btn.disabled = false;
                    btn.textContent = isSignUp ? 'Create Account' : 'Sign In';
                    return;
                }

                if (data.access_token) {
                    localStorage.setItem('dt_access_token', data.access_token);
                    localStorage.setItem('dt_refresh_token', data.refresh_token || '');
                    localStorage.setItem('dt_user', JSON.stringify(data.user));

                    showSuccess(isSignUp ? 'Account created! Redirecting...' : 'Success! Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                } else if (isSignUp) {
                    // Email confirmation required
                    showSuccess('Account created! Please check your email to verify your account, then sign in.');
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                    // Switch to sign-in mode
                    setTimeout(() => toggleMode(), 2000);
                }
            } catch (err) {
                showError('Network error. Please check your connection and try again.');
                btn.disabled = false;
                btn.textContent = isSignUp ? 'Create Account' : 'Sign In';
            }
        }
    </script>
    <script src="js/core.js"></script>
</body>
</html>
