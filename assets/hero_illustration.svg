<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="300" cy="200" r="180" fill="url(#bg-grad)" />
  
  <!-- Stylized Charts and Conversation Bubbles -->
  <g transform="translate(150, 100)">
    <!-- Bar Chart -->
    <rect x="20" y="80" width="40" height="100" rx="4" fill="#60a5fa" filter="url(#shadow)" />
    <rect x="70" y="40" width="40" height="140" rx="4" fill="#34d399" filter="url(#shadow)" />
    <rect x="120" y="100" width="40" height="80" rx="4" fill="#818cf8" filter="url(#shadow)" />
    <line x1="10" y1="190" x2="170" y2="190" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" />
    
    <!-- Speech Bubble 1 -->
    <path d="M-40,60 Q-40,20 0,20 L100,20 Q140,20 140,60 L140,100 Q140,140 100,140 L40,140 L0,180 L10,140 L0,140 Q-40,140 -40,100 Z" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" transform="translate(140, -40) scale(0.8)" filter="url(#shadow)" />
    <circle cx="170" cy="40" r="5" fill="#cbd5e1" />
    <circle cx="190" cy="40" r="5" fill="#cbd5e1" />
    <circle cx="210" cy="40" r="5" fill="#cbd5e1" />

    <!-- Connection Line -->
    <path d="M160,80 C100,80 100,150 50,150" fill="none" stroke="#f472b6" stroke-width="4" stroke-dasharray="8 4" />
  </g>
</svg>
